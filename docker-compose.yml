services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tanktrouble
      POSTGRES_USER: tanktrouble
      POSTGRES_PASSWORD: tanktrouble_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanktrouble"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: tanktrouble
      DB_PASS: tanktrouble_secret
      DB_NAME: tanktrouble
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
